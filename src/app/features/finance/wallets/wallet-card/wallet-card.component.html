<div
  class="wallet-card"
  [class.wallet-card--selected]="selected()"
  (click)="clicked.emit(wallet())"
  role="button"
  tabindex="0"
>
  <div class="wallet-card-top">
    <div class="wallet-type-info">
      <span class="wallet-type-icon">{{ meta.icon }}</span>
      <span class="wallet-type-label">{{ meta.label }}</span>
    </div>
    <div class="wallet-actions">
      <button class="icon-btn" (click)="editClicked.emit(wallet()); $event.stopPropagation()" aria-label="Edit">✏️</button>
      <button class="icon-btn icon-btn--danger" (click)="deleteClicked.emit(wallet()); $event.stopPropagation()" aria-label="Delete">🗑️</button>
    </div>
  </div>
  <h3 class="wallet-name">{{ wallet().name }}</h3>
  <div class="wallet-balance-section">
    <span class="wallet-balance-label">Balance</span>
    <span class="wallet-balance">{{ formatCurrency(wallet().balance, wallet().currency) }}</span>
  </div>
  <span class="wallet-currency">{{ wallet().currency }}</span>
</div>
