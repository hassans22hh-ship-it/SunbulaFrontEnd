<div class="auth-page">
  <div class="auth-card animate-scaleIn">
    <div class="auth-header">
      <span class="auth-logo">🔑</span>
      <h1 class="auth-title">Reset password</h1>
      <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>
    </div>

    @if (sent()) {
      <div class="auth-success">Check your inbox — we sent a reset link to your email.</div>
    } @else {
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-group">
          <label for="reset-email" class="form-label">Email</label>
          <input id="reset-email" type="email" formControlName="email" class="input-field" placeholder="you@example.com">
        </div>
        <sb-button type="submit" variant="primary" [fullWidth]="true" [loading]="loading()" [disabled]="form.invalid">
          Send Reset Link
        </sb-button>
      </form>
    }

    <div class="auth-footer">
      <a routerLink="/auth/login" class="auth-link">← Back to login</a>
    </div>
  </div>
</div>
