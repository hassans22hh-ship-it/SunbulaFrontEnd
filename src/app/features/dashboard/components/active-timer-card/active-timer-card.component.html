<div class="active-card" [class.is-running]="store.isRunning()">

  <div class="card-header">
    <div class="header-info">
      <h3 class="card-title" [class.running-title]="store.isRunning()">
        {{ store.isRunning() ? 'Timer Running' : 'Timer Ready' }}
      </h3>
      <p class="card-sub">Jump back into deep work.</p>
    </div>
    @if (store.isRunning()) {
      <div class="pulse-dot"></div>
    }
  </div>

  <div class="timer-display">
    {{ (store.activeSessions().length > 0 ? store.activeSessions()[0].durationSeconds : 0) | duration:'clock' }}
  </div>

  <a routerLink="/timer" class="action-link">
    {{ store.isRunning() ? 'Go to Timer →' : 'Start Focus Session' }}
  </a>

</div>
