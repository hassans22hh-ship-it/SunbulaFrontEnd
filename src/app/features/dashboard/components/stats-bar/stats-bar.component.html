<div class="stats-grid">

  <!-- Tasks Completed -->
  <div class="stat-card">
    <div class="stat-icon icon-success">✅</div>
    <div class="stat-info">
      <div class="stat-value">{{ tasksCompleted() }}</div>
      <div class="stat-label">Tasks Completed</div>
    </div>
  </div>

  <!-- Focus Time -->
  <div class="stat-card">
    <div class="stat-icon icon-primary">⏱️</div>
    <div class="stat-info">
      <div class="stat-value">
        {{ focusHoursToday() }}<span class="stat-unit">h</span>
        {{ focusMinsToday() }}<span class="stat-unit">m</span>
      </div>
      <div class="stat-label">Focus Today</div>
    </div>
  </div>

  <!-- Current Streak -->
  <div class="stat-card">
    <div class="stat-icon icon-warning">🔥</div>
    <div class="stat-info">
      <div class="stat-value">{{ streakDays() }}</div>
      <div class="stat-label">Day Streak</div>
    </div>
  </div>

  <!-- Coins Earned -->
  <div class="stat-card">
    <div class="stat-icon icon-accent">🪙</div>
    <div class="stat-info">
      <div class="stat-value">{{ coinsEarnedToday() }}</div>
      <div class="stat-label">Earned Today</div>
    </div>
  </div>

</div>
