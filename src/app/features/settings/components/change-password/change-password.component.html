<div class="page" sbPageTransition>
  <h1 class="section-title">Change Password</h1>
  <sb-card padding="lg">
    <form [formGroup]="passwordForm" (ngSubmit)="submit()" class="settings-form">
      <div class="form-group">
        <label class="form-label">Current Password</label>
        <input type="password" formControlName="currentPassword" class="input-field">
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" formControlName="newPassword" class="input-field">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input type="password" formControlName="confirmNewPassword" class="input-field">
      </div>
      <div class="form-actions">
        <sb-button type="submit" variant="primary" [loading]="isLoading()" [disabled]="passwordForm.invalid">
          Update Password
        </sb-button>
      </div>
    </form>
  </sb-card>
</div>
