<div class="settings-card">
  <h3 class="settings-title">
    <i class="fa-solid fa-user"></i>
    Edit Profile
  </h3>

  <div class="profile-hero">
    <div class="avatar">
      {{ getInitial() }}
      <button class="avatar-edit-btn" title="Change photo">
        <i class="fa-solid fa-pen"></i>
      </button>
    </div>
    <div>
      <div class="profile-name">{{ auth.user()?.fullName }}</div>
      <div class="profile-email">{{ auth.user()?.email }}</div>
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="name-grid">
      <div class="form-group">
        <label class="label-text">First Name</label>
        <input class="input-field" type="text" formControlName="firstName">
      </div>
      <div class="form-group">
        <label class="label-text">Last Name</label>
        <input class="input-field" type="text" formControlName="lastName">
      </div>
    </div>

    <div class="flex justify-end mt-6">
      <sb-button type="submit" [disabled]="form.invalid || form.pristine || saving()">
        @if (saving()) {
          <i class="fa-solid fa-spinner fa-spin mr-2"></i> Saving...
        } @else {
          <i class="fa-solid fa-floppy-disk mr-2"></i> Save Profile Changes
        }
      </sb-button>
    </div>
  </form>
</div>
