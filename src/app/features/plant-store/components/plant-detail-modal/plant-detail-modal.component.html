@if (plant()) {
  <sb-modal [title]="' '" maxWidth="450px" (closed)="closed.emit()">

    <div class="flex flex-col items-center text-center -mt-6">

      <div class="plant-hero-icon mb-6">
        @if (plant()!.imageUrl) {
          <img [src]="plant()!.imageUrl" [alt]="plant()!.name" class="w-20 h-20 object-contain drop-shadow-md" />
        } @else {
          <i class="fa-solid fa-seedling"></i>
        }
        <div class="level-badge-float"
             [style.background]="'var(--color-' + levelMeta.variant + ')'"
             [style.color]="'#fff'">
          {{ levelMeta.label }}
        </div>
      </div>

      <h2 class="text-2xl font-bold mb-2" style="color: var(--color-text);">{{ plant()!.name }}</h2>
      <p class="text-sm mb-6 leading-relaxed px-4" style="color: var(--color-text-muted);">
        {{ plant()!.description }}
      </p>

      <div class="detail-info-row mb-6">
        <div class="text-left">
          <div class="detail-label">Price</div>
          <div class="coin-badge px-3 py-1 text-base font-bold inline-flex items-center gap-1.5">
            <i class="fa-solid fa-coins"></i>
            {{ plant()!.price }}
          </div>
        </div>
        <div class="text-right">
          <div class="detail-label">Growth Stage</div>
          <div class="text-sm font-semibold" style="color: var(--color-text);">{{ stageMeta.label }}</div>
        </div>
      </div>

      <div class="w-full">
        <sb-button
          [fullWidth]="true"
          (clicked)="purchase.emit(plant()!)"
          [disabled]="purchasing()">
          @if (purchasing()) {
            <i class="fa-solid fa-spinner fa-spin mr-2"></i> Purchasing...
          } @else {
            <i class="fa-solid fa-cart-shopping mr-2"></i> Buy Seed
          }
        </sb-button>
      </div>

    </div>

  </sb-modal>
}
