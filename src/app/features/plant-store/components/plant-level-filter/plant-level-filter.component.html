<div class="level-filter-bar">
  <button class="filter-chip"
          [class.filter-chip--active]="selected() === null"
          (click)="select(null)">
    <i class="fa-solid fa-layer-group"></i>
    All Levels
  </button>

  @for (l of levels; track l.value) {
    <button class="filter-chip"
            [class.filter-chip--active]="selected() === l.value"
            (click)="select(l.value)">
      <span class="chip-emoji">{{ l.meta.emoji }}</span>
      {{ l.meta.label }}
    </button>
  }
</div>
