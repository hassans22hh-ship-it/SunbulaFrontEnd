<div class="filter-scroll custom-scrollbar">
  <button class="filter-pill"
          [class.active]="selected() === null"
          (click)="select(null)">
    <i class="fa-solid fa-layer-group mr-1.5"></i>
    All Levels
  </button>

  @for (l of levels; track l.value) {
    <button class="filter-pill"
            [class.active]="selected() === l.value"
            (click)="select(l.value)">
      <i class="fa-solid fa-seedling mr-1.5"></i>
      {{ l.meta.label }}
    </button>
  }
</div>
