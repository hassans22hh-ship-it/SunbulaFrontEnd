<div class="sb-confirm-backdrop animate-fadeIn" (click)="cancelled.emit()">
  <div class="sb-confirm animate-scaleIn" (click)="$event.stopPropagation()">
    <h3 class="sb-confirm__title">{{ title() }}</h3>
    @if (message()) {
      <p class="sb-confirm__message">{{ message() }}</p>
    }
    <div class="sb-confirm__actions">
      <sb-button variant="ghost" (click)="cancelled.emit()">{{ cancelText() }}</sb-button>
      <sb-button [variant]="variant()" (click)="confirmed.emit()">{{ confirmText() }}</sb-button>
    </div>
  </div>
</div>
