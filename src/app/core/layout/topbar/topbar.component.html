<header class="sb-topbar">
  <div class="sb-topbar__left">
    <h1 class="sb-topbar__greeting">Welcome back! 👋</h1>
  </div>

  <div class="sb-topbar__right">
    <!-- Streak -->
    <div class="sb-topbar__streak" title="Consecutive streak days">
      🔥 {{ auth.streakDays() }} days
    </div>

    <!-- Coin balance -->
    <div class="sb-topbar__coins">
      {{ auth.coinBalance() | coins }}
    </div>

    <!-- Theme toggle -->
    <button class="sb-topbar__theme-btn" (click)="theme.toggle()" title="Toggle theme">
      {{ theme.isDark() ? '☀️' : '🌙' }}
    </button>

    <!-- Logout -->
    <button class="sb-topbar__logout" (click)="logout()" title="Sign out">
      🚪
    </button>
  </div>
</header>
