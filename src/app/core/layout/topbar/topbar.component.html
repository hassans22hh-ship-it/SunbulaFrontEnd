<header class="sb-topbar">
  <div class="sb-topbar__left">
    <div class="sb-topbar__greeting-wrap">
      <h1 class="sb-topbar__greeting">
        <span class="greeting-time-emoji">
          @if (getTimeOfDay() === 'morning') { 🌤️ }
          @else if (getTimeOfDay() === 'afternoon') { ☀️ }
          @else { 🌙 }
        </span>
        {{ getGreeting() }}, <span class="greeting-name">{{ auth.user()?.firstName ?? 'there' }}</span>
      </h1>
      <p class="sb-topbar__date">{{ todayLabel }}</p>
    </div>
  </div>

  <div class="sb-topbar__right">
    <!-- Streak -->
    <div class="sb-topbar__streak" title="Consecutive streak days">
      <span class="streak-flame">🔥</span>
      <span class="streak-count">{{ auth.streakDays() }}</span>
      <span class="streak-label">day streak</span>
    </div>

    <!-- Coin balance -->
    <div class="sb-topbar__coins" [class.coin-pop]="coinAnimating">
      <sb-icon-coin />
      <span class="coin-value">{{ auth.coinBalance() | coins }}</span>
    </div>

    <!-- Theme toggle -->
    <button class="sb-topbar__icon-btn" (click)="theme.toggle()" title="Toggle theme">
      <span class="theme-icon">{{ theme.isDark() ? '☀️' : '🌙' }}</span>
    </button>

    <!-- Logout -->
    <button class="sb-topbar__icon-btn sb-topbar__icon-btn--logout" (click)="logout()" title="Sign out">
      <svg viewBox="0 0 24 24" fill="none" class="w-5 h-5" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    </button>
  </div>
</header>
