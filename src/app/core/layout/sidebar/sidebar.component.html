<aside class="sb-sidebar" [class.sb-sidebar--collapsed]="collapsed()">
  <!-- Brand -->
  <div class="sb-sidebar__brand">
    <span class="sb-sidebar__logo">🌱</span>
    @if (!collapsed()) {
      <span class="sb-sidebar__title">Sunbula</span>
    }
  </div>

  <!-- Navigation -->
  <nav class="sb-sidebar__nav">
    @for (item of navItems; track item.path) {
      <a class="sb-sidebar__link"
         [routerLink]="item.path"
         routerLinkActive="sb-sidebar__link--active">
        <span class="sb-sidebar__icon">{{ item.icon }}</span>
        @if (!collapsed()) {
          <span class="sb-sidebar__label">{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <!-- User section -->
  <div class="sb-sidebar__footer">
    @if (!collapsed()) {
      <div class="sb-sidebar__coin-badge">
        🪙 {{ auth.coinBalance() | coins }}
      </div>
    }
    <div class="sb-sidebar__user">
      <div class="sb-sidebar__avatar">{{ userInitials() }}</div>
      @if (!collapsed()) {
        <div class="sb-sidebar__user-info">
          <span class="sb-sidebar__user-name">{{ auth.user()?.fullName }}</span>
          <span class="sb-sidebar__user-email">{{ auth.user()?.email }}</span>
        </div>
      }
    </div>
  </div>

  <!-- Collapse toggle -->
  <button class="sb-sidebar__toggle" (click)="toggleCollapse()">
    {{ collapsed() ? '→' : '←' }}
  </button>
</aside>
